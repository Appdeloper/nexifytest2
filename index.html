<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo_v2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <title>Nexify Connect | Premium Social Ecosystem</title>
  </head>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #161128 0%, #0A0A0F 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .splash-container {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 50%;
      z-index: 2;
      filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
      animation: logoPulse 2.5s infinite ease-in-out;
    }
    .loader-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: #00E5FF;
      border-bottom-color: #7B61FF;
      animation: spinRing 1.2s linear infinite;
      z-index: 1;
      filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5));
    }
    .splash-title {
      margin-top: 24px;
      color: #ffffff;
      font-family: 'Poppins', 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
    }
    .splash-subtitle {
      margin-top: 10px;
      color: #8E88A0;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: pulseText 1.5s infinite ease-in-out;
    }
    @keyframes spinRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 25px rgba(123, 97, 255, 0.7)); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
  <body>
    <div id="splash">
      <div class="splash-container">
        <div class="loader-ring"></div>
        <img src="logo_v2.png" class="splash-logo" alt="Nexify Connect" />
      </div>
      <div class="splash-title">NEXIFY</div>
      <div class="splash-subtitle">Connecting Smarter...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          // Immediately unregister service workers during local development
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().then(() => {
                console.log('Unregistered local service worker. Reloading page...');
                window.location.reload(); // Force reload to clear cache
              });
            }
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js').catch(err => {
              console.log('SW Registration failed: ', err);
            });
          });
        }
      }
    </script>
  </body>
</html>
