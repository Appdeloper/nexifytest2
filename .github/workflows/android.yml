name: Build Android APK

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'
          cache: 'gradle'

      - name: Create Dummy Google Services JSON
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "Creating dummy google-services.json..."
            echo '{"project_info":{"project_number":"123456789","project_id":"dummy-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:12345:android:12345","android_client_info":{"package_name":"com.nexify.connect"}},"oauth_client":[{"client_id":"123456789-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"dummy-key"}]}]}' > android/app/google-services.json
          else
            echo "google-services.json already exists."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexify-connect-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
